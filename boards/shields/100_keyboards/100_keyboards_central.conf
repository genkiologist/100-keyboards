# --- 基本の分割設定 ---
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=4
CONFIG_BT_MAX_CONN=6
CONFIG_BT_MAX_PAIRED=6
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- トラックボール機能 ---
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_PAW3222=y

# --- エンコーダ・LED・スリープ ---
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_ZMK_STATUS_LED=y
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# board.cで定義されているログ出力を確認したい場合（デバッグ時のみ）
# CONFIG_ZMK_LOG_LEVEL_DBG=y

# --- 乾電池バッテリー設定 ---
CONFIG_ZMK_NON_LIPO_MIN_MV=1000
CONFIG_ZMK_NON_LIPO_LOW_MV=900
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# デバッグ用のログ機能をオフにして容量を稼ぐ
CONFIG_ZMK_USB_LOGGING=n
CONFIG_BT_CTLR_PHY_2M=n
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

# --- ZMK Studio ---
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
